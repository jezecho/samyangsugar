<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>큐원 고객센터 보이는 ARS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #1d1e8c; --bg: #f0f2f5; --red: #e74c3c; --text-dark: #333; --font-main: 'Noto Sans KR', sans-serif; }
        body { font-family: var(--font-main); background-color: var(--bg); margin: 0; padding: 10px; color: var(--text-dark); -webkit-font-smoothing: antialiased; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; min-height: 95vh; }
        header { padding: 20px; border-bottom: 1px solid #eee; text-align: center; }
        .logo-img { height: 35px; margin-bottom: 5px; }
        .header-title { font-size: 18px; font-weight: 700; color: var(--text-dark); }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .page h3 { font-size: 20px; font-weight: 700; text-align: center; margin-top: 0; margin-bottom: 25px; color: var(--main-blue); }
        .btn { width: 100%; padding: 18px; border: 1px solid #eee; border-radius: 12px; background: white; font-family: var(--font-main); font-size: 16px; font-weight: 500; text-align: left; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .form-group { margin-bottom: 18px; }
        label { font-size: 14px; font-weight: 700; color: #555; display: block; margin-bottom: 8px; }
        .required { color: var(--red); margin-left: 3px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: var(--font-main); font-size: 15px; color: var(--text-dark); }
        .flex-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .flex-group input, .flex-group select { flex: 1; min-width: 0; }
        .date-select-group { display: flex; gap: 5px; }
        .date-select-group select { flex: 1; padding: 10px 5px; font-size: 14px; }
        .large-input { min-height: 150px; line-height: 1.6; resize: vertical; }
        .submit-btn { width: 100%; padding: 16px; background: var(--main-blue); color: white; border: none; border-radius: 10px; font-family: var(--font-main); font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .back-btn { background: none; border: none; color: var(--main-blue); cursor: pointer; margin-bottom: 15px; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
        .loading-text { font-size: 13px; color: #777; text-align: center; margin-top: 12px; line-height: 1.4; }
        .call-icon { text-align: center; margin: 30px 0 20px; }
        .call-icon svg { width: 64px; height: 64px; fill: var(--main-blue); }
        .call-number { font-size: 30px; font-weight: 800; color: var(--main-blue); text-decoration: none; border: 3px solid var(--main-blue); padding: 12px 25px; border-radius: 50px; display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <div id="mainPage" class="page active">
        <header>
            <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNDAgODAiPjx0ZXh0IHg9IjEwIiB5PSI1MCIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjQwIiBmb250LXdlaWdodD0iYm9sZCIgZmlsbD0iIzFkMWU4YyI+U0FNWUFORzwvdGV4dD48L3N2Zz4=" class="logo-img">
            <div class="header-title">큐원 고객센터 보이는 ARS</div>
        </header>
        <div style="padding: 20px;">
            <button class="btn" onclick="showPage('qPage')">고객문의 <span>❯</span></button>
            <button class="btn" onclick="showPage('cPage')">불만접수 <span>❯</span></button>
            <button class="btn" onclick="showPage('reportPage')">성적서 문의 <span>❯</span></button>
            <button class="btn" onclick="showPage('docPage')">기타서류 요청 <span>❯</span></button>
            <button class="btn" onclick="showPage('callPage')">상담사 연결 <span>❯</span></button>
        </div>
    </div>

    <div id="qPage" class="page">
        <button class="back-btn" onclick="showPage('mainPage')">❮ 뒤로가기</button>
        <h3>고객문의</h3>
        <div class="form-group"><label>성함 <span class="required">*</span></label><input type="text" id="qName" placeholder="예: 홍길동"></div>
        <div class="form-group"><label>연락처 <span class="required">*</span></label><input type="tel" id="qTel" placeholder="예: 010-0000-0000"></div>
        <div class="form-group">
            <label>생년월일 (년/월/일)</label>
            <div class="date-select-group" id="qBirthGroup">
                <select id="qYear"></select> <select id="qMonth"></select> <select id="qDay"></select>
            </div>
        </div>
        <div class="form-group"><label>지역</label><input type="text" id="qRegion" placeholder="예: 서울시 강남구"></div>
        <div class="form-group">
            <label>메일주소 <span class="required">*</span></label>
            <div class="flex-group">
                <input type="text" id="qEmailId" placeholder="example"> @ 
                <select id="qEmailDomain" onchange="toggleDirectInput('q')">
                    <option value="naver.com">naver.com</option>
                    <option value="daum.net">daum.net</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="direct">직접입력</option>
                </select>
                <input type="text" id="qEmailDirect" placeholder="도메인 입력" style="display:none; margin-top:5px;">
            </div>
        </div>
        <div class="form-group"><label>문의내용 <span class="required">*</span></label><textarea id="qMsg" class="large-input" placeholder="문의하실 내용을 상세히 적어주세요."></textarea></div>
        <button class="submit-btn" id="qBtn" onclick="submitData('고객문의')">문의하기</button>
    </div>

    <div id="cPage" class="page">
        <button class="back-btn" onclick="showPage('mainPage')">❮ 뒤로가기</button>
        <h3>불만접수</h3>
        <div class="form-group"><label>성함 <span class="required">*</span></label><input type="text" id="cName" placeholder="예: 홍길동"></div>
        <div class="form-group"><label>연락처 <span class="required">*</span></label><input type="tel" id="cTel" placeholder="예: 010-0000-0000"></div>
        <div class="form-group">
            <label>메일주소 <span class="required">*</span></label>
            <div class="flex-group">
                <input type="text" id="cEmailId" placeholder="example"> @ 
                <select id="cEmailDomain" onchange="toggleDirectInput('c')">
                    <option value="naver.com">naver.com</option><option value="daum.net">daum.net</option><option value="gmail.com">gmail.com</option><option value="direct">직접입력</option>
                </select>
                <input type="text" id="cEmailDirect" placeholder="도메인 입력" style="display:none; margin-top:5px;">
            </div>
        </div>
        <div class="form-group">
            <label>제품명 <span class="required">*</span></label>
            <div class="flex-group">
                <select id="cProdList">
                    <option>하얀설탕</option><option>갈색설탕</option><option>흑설탕</option><option>분당</option><option>글레이즈</option><option>미립당</option><option>세립당</option><option>쌍백당</option><option>유자당</option><option>미니/미니바</option><option>자일로스설탕</option>
                </select>
                <input type="text" id="cProdWeight" placeholder="단량(예: 1kg)">
            </div>
        </div>
        <div class="form-group">
            <label>제품 LOT(제조일) <span class="required">*</span></label>
            <div class="date-select-group">
                <select id="cYear"></select> <select id="cMonth"></select> <select id="cDay"></select>
            </div>
        </div>
        <div class="form-group"><label>이물유형 <span class="required">*</span></label><select id="cType"><option>금속성이물</option><option>비금속성이물</option><option>해충</option><option>기타</option></select></div>
        <div class="form-group"><label>이물명</label><input type="text" id="cForeign" placeholder="예: 비닐 조각"></div>
        <div class="form-group"><label>사진 첨부</label><input type="file" id="cFile" accept="image/*"></div>
        <div class="form-group"><label>불만내용 <span class="required">*</span></label><textarea id="cMsg" class="large-input" placeholder="불만 사항을 상세히 적어주세요."></textarea></div>
        <button class="submit-btn" id="cBtn" onclick="submitData('불만접수')">접수하기</button>
        <div class="loading-text">※ 사진 첨부 용량에 따라 전송 시간이 소요될 수 있습니다.</div>
    </div>

    <div id="reportPage" class="page">
        <button class="back-btn" onclick="showPage('mainPage')">❮ 뒤로가기</button>
        <h3>성적서 문의</h3>
        <div class="form-group"><label>제품군 <span class="required">*</span></label><select id="rType"><option>설탕</option><option>전분</option><option>밀가루</option><option>유지</option></select></div>
        <div class="form-group">
            <label>제품명 <span class="required">*</span></label>
            <select id="rProdList">
                <option>하얀설탕</option><option>갈색설탕</option><option>흑설탕</option><option>분당</option><option>글레이즈</option><option>미립당</option><option>세립당</option><option>쌍백당</option><option>유자당</option><option>미니/미니바</option><option>자일로스설탕</option>
            </select>
        </div>
        <div class="form-group">
            <label>LOT번호(제조일) <span class="required">*</span></label>
            <div class="date-select-group">
                <select id="rYear"></select> <select id="rMonth"></select> <select id="rDay"></select>
            </div>
        </div>
        <div class="form-group"><label>받으실 메일 <span class="required">*</span></label><input type="email" id="rEmail" placeholder="예: example@naver.com"></div>
        <button class="submit-btn" id="rBtn" onclick="submitData('성적서문의')">신청하기</button>
    </div>

    <div id="docPage" class="page">
        <button class="back-btn" onclick="showPage('mainPage')">❮ 뒤로가기</button>
        <h3>기타서류 요청</h3>
        <div class="form-group"><label>제품군 <span class="required">*</span></label><select id="dType"><option>설탕</option><option>전분</option><option>밀가루</option><option>유지</option></select></div>
        <div class="form-group"><label>요청사항 <span class="required">*</span></label><textarea id="dMsg" class="large-input" placeholder="ex) HACCP 인증서, 하얀설탕 자가품질검사성적서, 원산지 증명서 등"></textarea></div>
        <div class="form-group"><label>받으실 메일 <span class="required">*</span></label><input type="email" id="dEmail" placeholder="예: example@naver.com"></div>
        <button class="submit-btn" id="dBtn" onclick="submitData('기타서류요청')">요청하기</button>
    </div>

    <div id="callPage" class="page">
        <button class="back-btn" onclick="showPage('mainPage')">❮ 뒤로가기</button>
        <div class="call-icon"><svg viewBox="0 0 24 24"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5C20.55,15.5 21,15.95 21,16.5V20C21,20.55 20.55,21 20,21C10.61,21 3,13.39 3,4C3,3.45 3.45,3 4,3H7.5C8.05,3 8.5,3.45 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg></div>
        <div style="text-align: center;">
            <a href="tel:0800233399" class="call-number">080-023-3399</a>
            <p style="margin-top:25px; color: #555; font-size: 15px; line-height: 1.7;">
                상담사 연결 (09:00~17:30)<br>
                <span style="font-weight: 700; color: var(--text-dark);">상담사 연결이 지연될 경우,<br>잠시 후 다시 연결을 시도해주십시오.</span>
            </p>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbylwu6HC9O87N4h3n4eWioVObXaIkxn_eqJ36v-Tlno4JlM0WReLR31uqpAcFFrs1us/exec";

    // 날짜 선택 드롭다운 초기화
    function initDateSelects(prefix, startYear, endYear) {
        const y = document.getElementById(prefix + 'Year');
        const m = document.getElementById(prefix + 'Month');
        const d = document.getElementById(prefix + 'Day');
        
        for(let i=endYear; i>=startYear; i--) { let opt = new Option(i+'년', i); y.add(opt); }
        for(let i=1; i<=12; i++) { let opt = new Option(i+'월', (i<10?'0'+i:i)); m.add(opt); }
        for(let i=1; i<=31; i++) { let opt = new Option(i+'일', (i<10?'0'+i:i)); d.add(opt); }
    }

    // 이메일 직접입력 토글
    function toggleDirectInput(prefix) {
        const domainSelect = document.getElementById(prefix + 'EmailDomain');
        const directInput = document.getElementById(prefix + 'EmailDirect');
        directInput.style.display = (domainSelect.value === 'direct') ? 'block' : 'none';
    }

    window.onload = function() {
        initDateSelects('q', 1930, 2026); // 고객문의: 생년월일
        initDateSelects('c', 2020, 2026); // 불만접수: LOT
        initDateSelects('r', 2020, 2026); // 성적서: LOT
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function submitData(type) {
        let payload = { title: type };
        let btn;

        if(type === '고객문의') {
            btn = document.getElementById('qBtn');
            payload.name = document.getElementById('qName').value;
            payload.contact = document.getElementById('qTel').value;
            payload.birth = `${document.getElementById('qYear').value}-${document.getElementById('qMonth').value}-${document.getElementById('qDay').value}`;
            payload.region = document.getElementById('qRegion').value;
            const domain = document.getElementById('qEmailDomain').value === 'direct' ? document.getElementById('qEmailDirect').value : document.getElementById('qEmailDomain').value;
            payload.userEmail = document.getElementById('qEmailId').value + "@" + domain;
            payload.message = document.getElementById('qMsg').value;
            if(!payload.name || !payload.contact || !document.getElementById('qEmailId').value || !payload.message) { alert("필수 항목(*)을 모두 입력해주세요."); return; }
        } else if(type === '불만접수') {
            btn = document.getElementById('cBtn');
            payload.name = document.getElementById('cName').value;
            payload.contact = document.getElementById('cTel').value;
            const domain = document.getElementById('cEmailDomain').value === 'direct' ? document.getElementById('cEmailDirect').value : document.getElementById('cEmailDomain').value;
            payload.userEmail = document.getElementById('cEmailId').value + "@" + domain;
            payload.prodName = document.getElementById('cProdList').value + " " + document.getElementById('cProdWeight').value;
            payload.lot = `${document.getElementById('cYear').value}-${document.getElementById('cMonth').value}-${document.getElementById('cDay').value}`;
            payload.foreignType = document.getElementById('cType').value;
            payload.foreignName = document.getElementById('cForeign').value;
            payload.message = document.getElementById('cMsg').value;
            if(!payload.name || !payload.contact || !payload.prodName || !payload.message) { alert("필수 항목(*)을 모두 입력해주세요."); return; }
        } else if(type === '성적서문의') {
            btn = document.getElementById('rBtn');
            payload.name = "성적서신청"; payload.contact = "-";
            payload.productType = document.getElementById('rType').value;
            payload.prodName = document.getElementById('rProdList').value;
            payload.lot = `${document.getElementById('rYear').value}-${document.getElementById('rMonth').value}-${document.getElementById('rDay').value}`;
            payload.userEmail = document.getElementById('rEmail').value;
            payload.message = "성적서 발송 요청";
            if(!payload.prodName || !payload.userEmail) { alert("필수 항목(*)을 모두 입력해주세요."); return; }
        } else if(type === '기타서류요청') {
            btn = document.getElementById('dBtn');
            payload.name = "서류요청"; payload.contact = "-";
            payload.productType = document.getElementById('dType').value;
            payload.userEmail = document.getElementById('dEmail').value;
            payload.message = document.getElementById('dMsg').value;
            payload.prodName = "기타서류"; payload.lot = "-";
            if(!payload.userEmail || !payload.message) { alert("필수 항목(*)을 모두 입력해주세요."); return; }
        }

        const fileInput = document.getElementById('cFile');
        if (type === '불만접수' && fileInput && fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const reader = new FileReader();
            btn.innerText = "이미지 처리 중..."; btn.disabled = true;
            reader.onload = function(e) {
                payload.imageFile = { content: e.target.result.split(',')[1], mimeType: file.type, name: file.name };
                sendToServer(payload, btn);
            };
            reader.readAsDataURL(file);
        } else {
            sendToServer(payload, btn);
        }
    }

    function sendToServer(payload, btn) {
        btn.innerText = "전송 중..."; btn.disabled = true;
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(res => {
            alert(payload.title + " 완료! 담당자에게 메일이 전송되었습니다.");
            showPage('mainPage');
        })
        .catch(err => alert("전송 오류: " + err))
        .finally(() => { btn.innerText = "전송 완료"; btn.disabled = false; });
    }
</script>
</body>
</html>
