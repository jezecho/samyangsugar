<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>큐원 고객센터 보이는 ARS</title>
    <style>
        :root { --main-blue: #1d1e8c; --bg: #f0f2f5; --red: #e74c3c; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; min-height: 95vh; }
        header { padding: 20px; border-bottom: 1px solid #eee; }
        .logo-img { height: 35px; margin-bottom: 5px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .btn { width: 100%; padding: 18px; border: 1px solid #eee; border-radius: 12px; background: white; font-size: 16px; font-weight: 600; text-align: left; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        .required { color: var(--red); margin-left: 3px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .large-input { min-height: 150px; line-height: 1.5; }
        .submit-btn { width: 100%; padding: 16px; background: var(--main-blue); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .back-btn { background: none; border: none; color: var(--main-blue); cursor: pointer; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div id="mainPage" class="page active">
        <header>
            <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNDAgODAiPjx0ZXh0IHg9IjEwIiB5PSI1MCIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjQwIiBmb250LXdlaWdodD0iYm9sZCIgZmlsbD0iIzFkMWU4YyI+U0FNWUFORzwvdGV4dD48L3N2Zz4=" class="logo-img">
            <div style="font-size:18px; font-weight:700;">큐원 고객센터 보이는 ARS</div>
        </header>
        <div style="padding: 20px;">
            <button class="btn" onclick="showPage('qPage')">고객문의 <span>❯</span></button>
            <button class="btn" onclick="showPage('cPage')">불만접수 <span>❯</span></button>
            <button class="btn" onclick="showPage('reportPage')">성적서 문의 <span>❯</span></button>
            <button class="btn" onclick="showPage('docPage')">기타서류 요청 <span>❯</span></button>
            <button class="btn" onclick="showPage('callPage')">상담사 연결 <span>❯</span></button>
        </div>
    </div>

    <div id="qPage" class="page">
        <button class="back-btn" onclick="showPage('mainPage')">❮ 뒤로가기</button>
        <h3>고객문의</h3>
        <div class="form-group"><label>이름 <span class="required">*</span></label><input type="text" id="qName"></div>
        <div class="form-group"><label>연락처 <span class="required">*</span></label><input type="tel" id="qTel" placeholder="010-0000-0000"></div>
        <div class="form-group"><label>메일주소 <span class="required">*</span></label><input type="email" id="qEmail"></div>
        <div class="form-group"><label>문의내용 <span class="required">*</span></label><textarea id="qMsg" class="large-input"></textarea></div>
        <button class="submit-btn" id="qBtn" onclick="submitData('고객문의')">문의하기</button>
    </div>

    </div>

<script>
    // 자바스크립트는 반드시 이 script 태그 안에 있어야 합니다.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbylwu6HC9O87N4h3n4eWioVObXaIkxn_eqJ36v-Tlno4JlM0WReLR31uqpAcFFrs1us/exec";

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function submitData(type) {
        let payload = { title: type };
        let btn;

        if(type === '고객문의') {
            btn = document.getElementById('qBtn');
            payload.name = document.getElementById('qName').value;
            payload.contact = document.getElementById('qTel').value;
            payload.userEmail = document.getElementById('qEmail').value;
            payload.message = document.getElementById('qMsg').value;
            if(!payload.name || !payload.contact || !payload.userEmail || !payload.message) { alert("필수 항목을 모두 입력해주세요."); return; }
        }
        // 나머지 로직 동일...
        sendToServer(payload, btn);
    }

    function sendToServer(payload, btn) {
        btn.innerText = "전송 중...";
        btn.disabled = true;

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(response => {
            if(response.result === "Success") {
                alert(payload.title + " 완료! 담당자에게 메일이 전송되었습니다.");
                showPage('mainPage');
            } else {
                alert("오류 발생: " + response.error);
            }
        })
        .catch(err => alert("전송 실패: " + err))
        .finally(() => {
            btn.innerText = "접수 완료";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
